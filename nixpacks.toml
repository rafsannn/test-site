<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Zenocart - Shop Smart. Live Better. Your trusted online marketplace in Bangladesh.">
  <title>Zenocart - Online Marketplace | Shop Smart. Live Better.</title>
  <meta property="og:title" content="Zenocart — Shop Smart. Live Better.">
  <meta property="og:description" content="Top-quality electronics and gadgets at the best prices, delivered across Bangladesh.">
  <meta property="og:image" content="/images/cover.png">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Zenocart">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="nav-placeholder"></div>
  <main>
    <!-- HERO -->
    <section class="hero">
      <div class="container">
        <div class="hero-inner">
          <div class="hero-content">
            <div class="hero-eyebrow" id="hero-eyebrow"><span class="dot"></span><span id="hero-pill-text">🎉 EID SPECIAL OFFER IS HERE</span></div>
            <h1>Shop Smart.<br><span class="highlight">Live Better.</span></h1>
            <p class="hero-desc">Discover top-quality electronics, gadgets, and lifestyle products — at the best prices, delivered to your doorstep across Bangladesh.</p>
            <div class="hero-offer-badge" id="hero-offer-badge">
              <span class="offer-text" id="offer-badge-main">5–7% OFF</span>
              <div class="offer-sub" id="offer-badge-sub"><strong>Eid Special Discount!</strong><br>5% (Air) · 7% (Sea) on all products</div>
            </div>
            <div class="hero-actions">
              <a href="/pages/shop.html" class="btn btn-white btn-lg">🛍️ Shop Now</a>
              <a href="https://facebook.com/zenocart.bd" target="_blank" class="btn btn-outline btn-lg" style="border-color:rgba(255,255,255,0.5);color:#fff">
                <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                Order on Facebook
              </a>
            </div>
          </div>
          <div class="hero-image">
            <img src="/images/cover.png" alt="Zenocart Products" onerror="this.src='/images/logo.png'">
          </div>
        </div>
      </div>
    </section>

    <!-- FEATURES -->
    <section class="features-strip">
      <div class="container">
        <div class="features-grid">
          <div class="feature-item"><div class="feature-icon">🚚</div><div class="feature-text"><h4>Nationwide Delivery</h4><p>Delivering across all of Bangladesh</p></div></div>
          <div class="feature-item"><div class="feature-icon">✅</div><div class="feature-text"><h4>Quality Guaranteed</h4><p>Certified & tested products only</p></div></div>
          <div class="feature-item"><div class="feature-icon">💰</div><div class="feature-text"><h4>Best Prices</h4><p>Factory direct competitive pricing</p></div></div>
          <div class="feature-item"><div class="feature-icon">📞</div><div class="feature-text"><h4>Easy Support</h4><p>Message us on Facebook anytime</p></div></div>
        </div>
      </div>
    </section>

    <!-- CATEGORIES -->
    <section class="categories-strip">
      <div class="container">
        <div class="section-header"><div><p class="section-subtitle" style="margin-bottom:0">Browse by category</p></div></div>
        <div class="categories-grid" id="home-categories"></div>
      </div>
    </section>

    <!-- FEATURED PRODUCTS -->
    <section class="products-section">
      <div class="container">
        <div class="section-header">
          <div><h2 class="section-title">Featured Products</h2><p class="section-subtitle" style="margin-bottom:0">Handpicked top sellers just for you</p></div>
          <a href="/pages/shop.html" class="btn btn-outline">View All →</a>
        </div>
        <div class="products-grid" id="featured-grid">
          <div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--gray)">Loading products…</div>
        </div>
      </div>
    </section>

    <!-- HOT DEALS -->
    <section class="products-section" style="padding-top:0">
      <div class="container">
        <div class="section-header">
          <div><h2 class="section-title">🔥 Hot Deals</h2><p class="section-subtitle" style="margin-bottom:0">Best sellers with biggest discounts</p></div>
          <a href="/pages/shop.html" class="btn btn-outline">View All →</a>
        </div>
        <div class="products-grid" id="hot-deals-grid"></div>
      </div>
    </section>

    <!-- CTA -->
    <section style="padding:64px 0">
      <div class="container">
        <div style="background:linear-gradient(135deg,var(--primary-dark),var(--primary-light));border-radius:24px;padding:56px 48px;display:flex;align-items:center;justify-content:space-between;gap:32px;flex-wrap:wrap;position:relative;overflow:hidden">
          <div style="position:absolute;top:-60px;right:-60px;width:300px;height:300px;background:rgba(255,255,255,.05);border-radius:50%"></div>
          <div style="position:relative;z-index:1">
            <p style="color:rgba(255,255,255,.8);font-size:.9rem;margin-bottom:8px;font-weight:600;letter-spacing:.08em;text-transform:uppercase">📘 Follow us on Facebook</p>
            <h2 style="font-family:'Playfair Display',serif;font-size:clamp(1.5rem,3vw,2.2rem);color:#fff;margin-bottom:12px;font-weight:700">Get Exclusive Deals &<br>New Arrivals First</h2>
            <p style="color:rgba(255,255,255,.75);max-width:440px">Join thousands of happy customers on Facebook!</p>
          </div>
          <div style="display:flex;flex-direction:column;gap:12px;flex-shrink:0;position:relative;z-index:1">
            <a href="https://facebook.com/zenocart.bd" target="_blank" class="btn btn-white btn-lg">
              <svg width="20" height="20" fill="#1877f2" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
              Visit Facebook Page
            </a>
            <a href="/pages/shop.html" class="btn btn-outline" style="border-color:rgba(255,255,255,.5);color:#fff">🛍️ Browse All Products</a>
          </div>
        </div>
      </div>
    </section>
  </main>
  <div id="footer-placeholder"></div>

  <script src="/js/products.js"></script>
  <script src="/js/layout.js"></script>
  <script src="/js/core.js"></script>
  <script>
    injectLayout('/');
    // Load hero text from settings — hide sections if empty
    fetch('/api/settings').then(r=>r.json()).then(cfg=>{
      // Pill (eyebrow)
      const pill = document.getElementById('hero-eyebrow');
      if(cfg.heroPill && cfg.heroPill.trim()){
        document.getElementById('hero-pill-text').textContent = cfg.heroPill.trim();
        pill.style.display = '';
      } else {
        pill.style.display = 'none';
      }
      // Offer badge
      const badge = document.getElementById('hero-offer-badge');
      const hasMain = cfg.offerBadgeMain && cfg.offerBadgeMain.trim();
      const hasSub  = cfg.offerBadgeSub  && cfg.offerBadgeSub.trim();
      if(hasMain || hasSub){
        if(hasMain) document.getElementById('offer-badge-main').textContent = cfg.offerBadgeMain.trim();
        if(hasSub)  document.getElementById('offer-badge-sub').innerHTML = cfg.offerBadgeSub.trim();
        badge.style.display = '';
      } else {
        badge.style.display = 'none';
      }
    }).catch(()=>{});

    document.addEventListener('DOMContentLoaded', async () => {
      // Categories
      const catGrid = document.getElementById('home-categories');
      CATEGORIES.forEach(cat => {
        const pill = document.createElement('div');
        pill.className = 'category-pill';
        pill.innerHTML = '<span class="cat-icon">' + cat.icon + '</span>' + cat.label;
        pill.onclick = () => { window.location = cat.slug === 'all' ? '/pages/shop.html' : '/pages/shop.html?cat=' + cat.slug; };
        catGrid.appendChild(pill);
      });

      const products = await loadProducts();

      // Featured (first 8)
      const featuredGrid = document.getElementById('featured-grid');
      const featured = products.slice(0, 8);
      featuredGrid.innerHTML = featured.length
        ? featured.map(p => renderProductCard(p, '/')).join('')
        : '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--gray)">No products yet. <a href="/admin" style="color:var(--primary)">Add some in Admin →</a></div>';

      // Hot deals
      const hotGrid = document.getElementById('hot-deals-grid');
      const hot = products.filter(p => p.badge === 'hot');
      hotGrid.innerHTML = hot.map(p => renderProductCard(p, '/')).join('');
    });
  </script>
  <!-- WhatsApp Floating Button -->
  <div id="wa-float" style="position:fixed;bottom:24px;right:24px;z-index:999;display:none">
    <a id="wa-float-link" href="#" target="_blank" rel="noopener"
      style="display:flex;align-items:center;justify-content:center;width:56px;height:56px;background:#25d366;border-radius:50%;box-shadow:0 4px 20px rgba(37,211,102,.4);transition:all .2s ease;text-decoration:none"
      title="Chat with us on WhatsApp">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="#fff"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
    </a>
  </div>
  <script>
    fetch('/api/settings').then(r=>r.json()).then(cfg=>{
      if(cfg.whatsapp){
        const wa='880'+cfg.whatsapp.replace(/^0/,'');
        document.getElementById('wa-float-link').href='https://wa.me/'+wa+'?text=Hi+Zenocart!+I+need+help.';
        document.getElementById('wa-float').style.display='block';
      }
    }).catch(()=>{});
  </script>
</body>
</html>
