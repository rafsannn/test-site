<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop | Zenocart Online Marketplace</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    /* ── Mobile filter toggle button ── */
    .filter-toggle-btn {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 9px 16px;
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: var(--r);
      font-size: .875rem;
      font-weight: 600;
      color: var(--dark);
      cursor: pointer;
      transition: var(--t);
    }
    .filter-toggle-btn:hover { border-color: var(--primary); color: var(--primary); }
    .filter-toggle-btn .badge-count {
      background: var(--primary);
      color: #fff;
      font-size: .7rem;
      font-weight: 700;
      padding: 1px 7px;
      border-radius: 100px;
      display: none;
    }
    .filter-toggle-btn .badge-count.show { display: inline-block; }

    /* Mobile: show toggle, hide sidebar by default */
    @media(max-width:899px) {
      .filter-toggle-btn { display: flex; }
      .shop-sidebar { display: none; }
      .shop-sidebar.open { display: block; }
    }

    /* Active filter indicator dot */
    .filter-active-dot {
      width: 8px; height: 8px;
      background: var(--primary);
      border-radius: 50%;
      display: none;
    }
    .filter-active-dot.show { display: inline-block; }
  </style>
</head>
<body>
  <div id="nav-placeholder"></div>
  <div class="page-header"><div class="container"><h1>Our Products</h1><p>Shop Smart. Live Better. — Quality gadgets at unbeatable prices.</p></div></div>
  <main>
    <section class="shop-page">
      <div class="container">

        <!-- Mobile filter bar (visible only on mobile) -->
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:10px">
          <button class="filter-toggle-btn" id="filter-toggle-btn" onclick="toggleFilters()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="10" y1="18" x2="14" y2="18"/></svg>
            Filters
            <span class="badge-count" id="filter-badge">0</span>
          </button>
          <p class="shop-count" id="shop-count" style="font-size:.85rem;color:var(--gray)">Loading…</p>
        </div>

        <div class="shop-layout">
          <aside class="shop-sidebar" id="shop-sidebar">
            <!-- Close button (mobile only) -->
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px" class="sidebar-mobile-header">
              <span style="font-size:.9rem;font-weight:700;color:var(--dark)">🔍 Filters</span>
              <button onclick="toggleFilters()" style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-size:.8rem;cursor:pointer;color:var(--dark)">✕ Close</button>
            </div>

            <div class="sidebar-section">
              <div class="sidebar-title">Categories</div>
              <div id="sidebar-categories"></div>
            </div>
            <div class="sidebar-section">
              <div class="sidebar-title">Price Range</div>
              <div style="display:flex;flex-direction:column;gap:8px">
                <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:.875rem;color:var(--dark-mid)"><input type="radio" name="price" value="all" checked onchange="filterProducts();updateFilterBadge()"> All Prices</label>
                <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:.875rem;color:var(--dark-mid)"><input type="radio" name="price" value="under500" onchange="filterProducts();updateFilterBadge()"> Under ৳500</label>
                <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:.875rem;color:var(--dark-mid)"><input type="radio" name="price" value="500to1000" onchange="filterProducts();updateFilterBadge()"> ৳500 – ৳1,000</label>
                <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:.875rem;color:var(--dark-mid)"><input type="radio" name="price" value="1000to2000" onchange="filterProducts();updateFilterBadge()"> ৳1,000 – ৳2,000</label>
                <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:.875rem;color:var(--dark-mid)"><input type="radio" name="price" value="above2000" onchange="filterProducts();updateFilterBadge()"> Above ৳2,000</label>
              </div>
            </div>
            <div class="sidebar-section">
              <div class="sidebar-title">Sort By</div>
              <div style="display:flex;flex-direction:column;gap:8px">
                <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:.875rem;color:var(--dark-mid)"><input type="radio" name="sort" value="default" checked onchange="filterProducts()"> Featured</label>
                <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:.875rem;color:var(--dark-mid)"><input type="radio" name="sort" value="price-low" onchange="filterProducts()"> Price: Low to High</label>
                <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:.875rem;color:var(--dark-mid)"><input type="radio" name="sort" value="price-high" onchange="filterProducts()"> Price: High to Low</label>
                <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:.875rem;color:var(--dark-mid)"><input type="radio" name="sort" value="rating" onchange="filterProducts()"> Top Rated</label>
                <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:.875rem;color:var(--dark-mid)"><input type="radio" name="sort" value="sold" onchange="filterProducts()"> Best Selling</label>
              </div>
            </div>

            <!-- Reset button (mobile) -->
            <button onclick="resetFilters()" class="btn btn-outline btn-full btn-sm" style="margin-top:8px">Reset Filters</button>
          </aside>

          <div>
            <!-- Desktop count (hidden on mobile — shown in the bar above) -->
            <div class="shop-main-header" style="display:none" id="desktop-count-bar">
              <p class="shop-count" id="shop-count-desktop"></p>
            </div>
            <div class="products-grid" id="shop-grid"><div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--gray)">Loading products…</div></div>
            <div id="no-results" style="display:none;text-align:center;padding:64px 0">
              <div style="font-size:3rem;margin-bottom:16px">🔍</div>
              <h3 style="color:var(--dark);margin-bottom:8px">No products found</h3>
              <p style="color:var(--gray)">Try adjusting your filters</p>
              <button onclick="resetFilters()" class="btn btn-primary" style="margin-top:16px">Reset Filters</button>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>
  <div id="footer-placeholder"></div>
  <script src="/js/products.js"></script>
  <script src="/js/layout.js"></script>
  <script src="/js/core.js"></script>
  <script>
    injectLayout('/');
    let allLoaded = [];
    let activeCategory = 'all';
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('cat')) activeCategory = urlParams.get('cat');

    function toggleFilters() {
      const sidebar = document.getElementById('shop-sidebar');
      sidebar.classList.toggle('open');
    }

    function updateFilterBadge() {
      const price = document.querySelector('input[name="price"]:checked')?.value || 'all';
      const sort  = document.querySelector('input[name="sort"]:checked')?.value  || 'default';
      let active  = 0;
      if (activeCategory !== 'all') active++;
      if (price !== 'all') active++;
      if (sort !== 'default') active++;
      const badge = document.getElementById('filter-badge');
      badge.textContent = active;
      badge.classList.toggle('show', active > 0);
    }

    document.addEventListener('DOMContentLoaded', async () => {
      const sidebarCats = document.getElementById('sidebar-categories');
      allLoaded = await loadProducts();
      const counts = {};
      allLoaded.forEach(p => { counts[p.categorySlug||p.category_slug] = (counts[p.categorySlug||p.category_slug]||0)+1; });

      // Try to load categories from API first
      let cats = CATEGORIES;
      try {
        const cr = await fetch('/api/categories');
        const apiCats = await cr.json();
        if (apiCats.length) cats = [{slug:'all',label:'All Products',icon:'🛍️'}, ...apiCats.map(c=>({slug:c.slug,label:c.name,icon:c.icon||'📦'}))];
      } catch(e) {}

      cats.forEach(cat => {
        const count = cat.slug === 'all' ? allLoaded.length : (counts[cat.slug]||0);
        const div = document.createElement('div');
        div.className = 'sidebar-category-item' + (activeCategory===cat.slug?' active':'');
        div.dataset.slug = cat.slug;
        div.innerHTML = '<span>' + (cat.icon||'') + ' ' + (cat.label||cat.name) + '</span><span class="count">' + count + '</span>';
        div.onclick = () => {
          activeCategory = cat.slug;
          document.querySelectorAll('.sidebar-category-item').forEach(el=>el.classList.remove('active'));
          div.classList.add('active');
          filterProducts();
          updateFilterBadge();
          // Auto-close sidebar on mobile after selecting category
          if(window.innerWidth < 900) document.getElementById('shop-sidebar').classList.remove('open');
        };
        sidebarCats.appendChild(div);
      });

      // If URL had category param, open filter to show it's active on mobile
      if (urlParams.get('cat')) updateFilterBadge();

      filterProducts();
    });

    function filterProducts() {
      let filtered = [...allLoaded];
      if (activeCategory !== 'all') filtered = filtered.filter(p => (p.categorySlug||p.category_slug) === activeCategory);
      const price = document.querySelector('input[name="price"]:checked')?.value||'all';
      if (price==='under500') filtered=filtered.filter(p=>p.price<500);
      else if(price==='500to1000') filtered=filtered.filter(p=>p.price>=500&&p.price<=1000);
      else if(price==='1000to2000') filtered=filtered.filter(p=>p.price>1000&&p.price<=2000);
      else if(price==='above2000') filtered=filtered.filter(p=>p.price>2000);
      const sort = document.querySelector('input[name="sort"]:checked')?.value||'default';
      if(sort==='price-low') filtered.sort((a,b)=>a.price-b.price);
      else if(sort==='price-high') filtered.sort((a,b)=>b.price-a.price);
      else if(sort==='rating') filtered.sort((a,b)=>b.rating-a.rating);
      else if(sort==='sold') filtered.sort((a,b)=>b.sold-a.sold);
      const grid=document.getElementById('shop-grid');
      const noRes=document.getElementById('no-results');
      const countText = filtered.length + ' product' + (filtered.length!==1?'s':'');
      document.getElementById('shop-count').textContent = countText;
      if(!filtered.length){grid.innerHTML='';grid.style.display='none';noRes.style.display='block';}
      else{grid.style.display='grid';noRes.style.display='none';grid.innerHTML=filtered.map(p=>renderProductCard(p,'/')).join('');}
    }

    function resetFilters(){
      activeCategory='all';
      document.querySelectorAll('.sidebar-category-item').forEach(el=>el.classList.toggle('active',el.dataset.slug==='all'));
      document.querySelector('input[name="price"][value="all"]').checked=true;
      document.querySelector('input[name="sort"][value="default"]').checked=true;
      filterProducts();
      updateFilterBadge();
    }
  </script>
  <div id="wa-float" style="position:fixed;bottom:24px;right:24px;z-index:999;display:none">
    <a id="wa-float-link" href="#" target="_blank" style="display:flex;align-items:center;justify-content:center;width:56px;height:56px;background:#25d366;border-radius:50%;box-shadow:0 4px 20px rgba(37,211,102,.4);text-decoration:none" title="Chat on WhatsApp">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="#fff"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
    </a>
  </div>
  <script>fetch('/api/settings').then(r=>r.json()).then(cfg=>{ if(cfg.whatsapp){ const wa='880'+cfg.whatsapp.replace(/^0/,''); document.getElementById('wa-float-link').href='https://wa.me/'+wa+'?text=Hi+Zenocart!+I+need+help.'; document.getElementById('wa-float').style.display='block'; } }).catch(()=>{}); </script>
</body>
</html>
